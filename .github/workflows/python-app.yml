name: CI · Build · Lint · Auto‑PR

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Verificações de Qualidade (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11' ]
      fail-fast: false

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Análise estática com Pylint
        if: always()
        run: |
          echo "Desabilitando códigos de verificação do Pylint:"
          echo " - C0114: Docstring de módulo ausente"
          echo " - C0115: Docstring de classe ausente"
          echo " - C0116: Docstring de função/método ausente"
          echo " - C0411: Import externo deve vir antes"
          echo " - C0412: Imports do mesmo pacote fora de ordem"
          echo " - R0903: Classe muito simples"
          echo " - C0301: Linha muito longa"
          
          echo ""
          echo "Iniciando análise com Pylint..."
          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 \
                  --output-format=text:pylint_output.txt --exit-zero
          
          echo ""
          echo "Análise finalizada. Extraindo nota..."
          
          SCORE=$(python3 -c "
          import re
          with open('pylint_output.txt') as f:
              text = f.read()
          m = re.search(r'Your code has been rated at ([\\d.]+)/10', text)
          print(m.group(1) if m else '0')
          ")
          
          echo "Nota extraída do Pylint: $SCORE/10"
          echo "pylint_score=$SCORE" >> $GITHUB_OUTPUT
          
          if (( $(echo "$SCORE >= 9.0" | bc -l) )); then
            echo "✅ Score igual ou superior a 9.0. Passando na análise!"
            exit 0
          else
            echo "❌ Score abaixo de 9.0. Falha na análise."
            exit 1
          fi

      - name: Análise de código com Flake8
        if: always()
        run: |
          echo "Desabilitando regras específicas para análise crítica:"
          echo " - E9: Erros de sintaxe"
          echo " - F63, F7, F82: Erros de nomes indefinidos, etc"
          
          echo ""
          echo "Iniciando análise crítica com Flake8 (E9, F63, F7, F82)..."
          flake8 . --select=E9,F63,F7,F82 --show-source --statistics --count | tee flake8_critical.txt
          STATUS_CRITICOS=${PIPESTATUS[0]}
          
          echo ""
          echo "Análise crítica finalizada. Verifique o arquivo flake8_critical.txt."
          
          CRITICAL_ERRORS=$(cat flake8_critical.txt | grep -v "^$")
          QTD_CRITICOS=$(cat flake8_critical.txt | grep -c "^[^ ]")
          echo "Erros críticos encontrados: $QTD_CRITICOS"
          
          echo ""
          echo "Iniciando análise geral de estilo/complexidade com Flake8 (complexidade <= 10, linha <= 127)..."
          flake8 . --max-complexity=10 --max-line-length=127 --statistics --count | tee flake8_all.txt
          STATUS_OUTROS=${PIPESTATUS[0]}
          
          echo ""
          echo "Análise de estilo finalizada. Verifique o arquivo flake8_all.txt."
          
          OTHER_ERRORS=$(cat flake8_all.txt | grep -v "^$")
          QTD_OUTROS=$(cat flake8_all.txt | grep -c "^[^ ]")
          echo "Problemas de estilo/complexidade encontrados: $QTD_OUTROS"
          
          echo ""
          echo "Resumo Flake8:"
          echo " - Erros críticos: $QTD_CRITICOS"
          echo " - Outros problemas: $QTD_OUTROS"
          
          if [ "$QTD_CRITICOS" = "0" ] && [ "$QTD_OUTROS" = "0" ]; then
            echo "✅ Nenhum erro Flake8 encontrado. Passando na análise!"
            exit 0
          elif [ "$QTD_CRITICOS" = "0" ]; then
            echo "⚠️ Foram encontrados $QTD_OUTROS problemas de estilo/complexidade. Recomenda-se revisão."
            exit 0
          else
            echo "❌ Foram encontrados $QTD_CRITICOS erros críticos pelo Flake8."
            exit 1
          fi


      - name: Resumo do Lint
        if: always()
        run: |
          echo "## Resumo do Lint"
          echo ""
          
          echo "### Flake8 - Erros críticos"
          ERROS_CRITICOS=$(flake8 . --select=E9,F63,F7,F82 --show-source)
          QTDE_CRITICOS=$(flake8 . --count --select=E9,F63,F7,F82)
          
          if [ "$QTDE_CRITICOS" = "0" ]; then
            echo "✅ Nenhum erro crítico encontrado"
          else
            echo "❌ Foram encontrados $QTDE_CRITICOS erros críticos:"
            echo "$ERROS_CRITICOS"
            echo ""
            echo "----"
            flake8 . --select=E9,F63,F7,F82 --statistics
          fi
          
          echo ""
          echo "### Flake8 - Outros problemas de estilo e complexidade"
          ERROS_OUTROS=$(flake8 . --max-complexity=10 --max-line-length=127)
          QTDE_OUTROS=$(flake8 . --count --max-complexity=10 --max-line-length=127)
          
          if [ "$QTDE_OUTROS" = "0" ]; then
            echo "✅ Nenhum problema de estilo/complexidade encontrado"
          else
            echo "❌ Foram encontrados $QTDE_OUTROS problemas:"
            echo "$ERROS_OUTROS"
            echo ""
            echo "----"
            flake8 . --max-complexity=10 --max-line-length=127 --statistics
          fi
          
          echo ""
          echo "### Pylint"
          echo "Nota final: ${{ steps.pylint_check.outputs.pylint_score }}/10"


      - name: Resumo do Pylint
        if: always()
        run: |
          echo "Relatório completo do Pylint:"
          cat pylint_output.txt || echo "Relatório pylint não encontrado"

  auto-pull-request:
    name: Criar/Atualizar Pull Request
    needs: quality-check
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/feature/') &&
      needs.quality-check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Criar ou atualizar PR automaticamente
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = context.ref.replace('refs/heads/','');
            const openPrs = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${head}`,
              base: 'develop',
              state: 'open'
            });
            if (openPrs.data.length) {
              core.notice(`PR #${openPrs.data[0].number} já existe ✅`);
              return;
            }
            const pr = await github.rest.pulls.create({
              owner, repo,
              head, base: 'develop',
              title: `PR gerado automaticamente: ${head} -> develop`,
              body: '',
              draft: false
            });
            core.notice(`PR criado: #${pr.data.number}`);
