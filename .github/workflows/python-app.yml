name: Python CI

on:
  push:
    branches:
      - feature/test-workflows
  pull_request:
    branches:
      - feature/test-workflows
      - develop
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Para erros críticos (parar build se houver esses problemas)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Para estatísticas e código mais limpo
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --output-file=flake8_warnings.txt

      - name: Rodar Pylint
        id: pylint_check
        run: |
          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 --output-format=text > pylint_output.txt || true
          SCORE=$(pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 --score=y || true | tail -2 | head -1 | awk \'{print $NF}\' | sed \'s#/10##\')
          echo "Pylint Score: $SCORE"
          echo "pylint_score=$SCORE" >> $GITHUB_OUTPUT
          if (( $(echo "$SCORE < 9" | bc -l) )); then
            echo "Pylint score ($SCORE) is below 9. Failing build."
            exit 1
          else
            echo "Pylint score ($SCORE) is 9 or above. Passing build."
          fi

      - name: Exibir Warnings do Flake8
        if: always()
        run: |
          echo "### Warnings do Flake8 (não quebram o build)"
          cat flake8_warnings.txt || echo "Nenhum warning do Flake8 encontrado."

      - name: Exibir Saída do Pylint
        if: always()
        run: |
          echo "### Saída Completa do Pylint"
          cat pylint_output.txt

      - name: Verificar Resultado Final do Lint
        if: always()
        run: |
          echo "### Resumo do Lint"
          if [ -f flake8_warnings.txt ] && [ $(wc -l < flake8_warnings.txt) -gt 0 ]; then
            echo "Flake8 encontrou warnings. Verifique a seção 'Warnings do Flake8'."
          else
            echo "Flake8 não encontrou warnings."
          fi
          if [ ${{ steps.pylint_check.outputs.pylint_score }} -lt 9 ]; then
            echo "Pylint falhou com score ${{ steps.pylint_check.outputs.pylint_score }}. O build foi quebrado."
            exit 1
          else
            echo "Pylint passou com score ${{ steps.pylint_check.outputs.pylint_score }}."
          fi

      - name: Test with pytest
        run: |
          pytest

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref_name, 'feature/') && needs.build.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: develop
          title: 'PR automático: ${{ github.ref_name }}'
          body: |
            Esse PR foi criado automaticamente porque o build passou para a branch `${{ github.ref_name }}`.

