name: Python CI

on:
  push:
    branches: [ feature/test-workflows ]
  pull_request:
    branches: [ feature/test-workflows, develop, prod ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
                  --statistics --format=json --output-file=flake8_report.json

      - name: Run pylint
        id: pylint_check
        run: |
          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 \
                  --output-format=json:pylint_report.json,text:pylint_output.txt --exit-zero

          SCORE=$(python3 -c "
          import json, re
          try:
              with open('pylint_report.json') as f:
                  data = json.load(f)
              if isinstance(data, dict) and 'score' in data:
                  print(f'{data[\"score\"]:.2f}')
              else:
                  with open('pylint_output.txt') as f:
                      m = re.search(r'Your code has been rated at ([\d.]+)/10', f.read())
                      print(m.group(1) if m else '0')
          except:
              print('0')
          ")

          echo "pylint_score=$SCORE" >> $GITHUB_OUTPUT
          python3 -c "exit(0) if float('$SCORE') >= 9.0 else exit(1)"

      # - name: Test with pytest
      #   run: pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Display lint summary
        if: always()
        run: |
          echo "## 📊 Lint Summary"

          echo "### Flake8"
          if [ -f flake8_report.json ]; then
            python3 -c "
          import json
          try:
              with open('flake8_report.json') as f:
                  data = json.load(f)
              if data:
                  print(f'Found {len(data)} style issues')
                  for issue in data[:5]:
                      print(f'  - {issue[\"filename\"]}:{issue[\"line_number\"]} {issue[\"code\"]}: {issue[\"text\"]}')
                  if len(data) > 5:
                      print(f'  ... and {len(data) - 5} more issues')
              else:
                  print('✅ No style issues found')
          except Exception as e:
              print(f'Could not parse flake8 results: {e}')
          "
          else
            echo "No flake8 report found"
          fi

          echo "### Pylint"
          echo "Score: ${{ steps.pylint_check.outputs.pylint_score }}/10"
          [ -f pylint_output.txt ] && echo "Full report in pylint_output.txt"

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-py${{ matrix.python-version }}
          path: |
            flake8_report.json
            pylint_report.json
            pylint_output.txt
            coverage.xml
          retention-days: 30

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: >
      startsWith(github.ref_name, 'feature/') && 
      needs.build.result == 'success' &&
      github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: check_pr
        run: |
          EXISTING_PR=$(gh pr list --head ${{ github.ref_name }} --base develop --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request
        if: steps.check_pr.outputs.pr_exists == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: develop
          title: "🚀 Auto PR: ${{ github.ref_name }}"
          body: |
            ## 🤖 Automated Pull Request

            CI passed for branch `${{ github.ref_name }}`.

            **CI Status**
            - Build: ✅
            - Lint: ✅
            - Tests: ✅

            Please review and merge.
          labels: |
            automated
            feature
          draft: false

      - name: Update existing PR
        if: steps.check_pr.outputs.pr_exists == 'true'
        run: |
          gh pr comment ${{ steps.check_pr.outputs.pr_number }} \
            --body "✅ CI checks passed for commit ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
