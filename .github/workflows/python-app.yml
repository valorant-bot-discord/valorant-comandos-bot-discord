name: CI · Build · Lint · Auto‑PR

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [ 'feature/**' ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch: { }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Verificações de Qualidade (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11' ]
      fail-fast: false

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Análise estática com Pylint
        id: pylint_check
        run: |
          echo "Desabilitando códigos de verificação do Pylint:"
          echo " - C0114: Docstring de módulo ausente"
          echo " - C0115: Docstring de classe ausente"
          echo " - C0116: Docstring de função/método ausente"
          echo " - C0411: Import externo deve vir antes"
          echo " - C0412: Imports do mesmo pacote fora de ordem"
          echo " - R0903: Classe muito simples"
          echo " - C0301: Linha muito longa"
          
          echo ""
          echo "Iniciando análise com Pylint..."
          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 \
                  --output-format=text:pylint_output.txt --exit-zero
          
          echo ""
          echo "Análise finalizada. Extraindo nota..."
          
          SCORE=$(python3 -c "
          import re
          with open('pylint_output.txt') as f:
              text = f.read()
          m = re.search(r'Your code has been rated at ([\\d.]+)/10', text)
          print(m.group(1) if m else '0')
          ")
          
          echo "Nota extraída do Pylint: $SCORE/10"
          echo "pylint_score=$SCORE" >> $GITHUB_OUTPUT
          
          if (( $(echo "$SCORE >= 9.0" | bc -l) )); then
            echo "✅ Score igual ou superior a 9.0. Passando na análise!"
            exit 0
          else
            echo "❌ Score abaixo de 9.0. Falha na análise."
            exit 1
          fi

      - name: Análise de código com Flake8
        if: always()
        run: |
          echo "Executando Flake8 (apenas erros críticos):"
          QTDE_CRITICOS=$(flake8 . --count --select=E9,F63,F7,F82)
          echo "$QTDE_CRITICOS"
          if [ "$QTDE_CRITICOS" = "0" ]; then
            exit 0
          fi
          
          flake8 . --select=E9,F63,F7,F82 --show-source --statistics
          
          echo ""
          echo "Executando Flake8 (verificação completa de estilo e complexidade):"
          QTDE_OUTROS=$(flake8 . --count --max-complexity=10 --max-line-length=127)
          echo "$QTDE_OUTROS"
          if [ "$QTDE_OUTROS" = "0" ]; then
            exit 0
          fi
          
          flake8 . --max-complexity=10 --max-line-length=127 --statistics


      - name: Resumo do Lint
        if: always()
        run: |
          echo "## Resumo do Lint"

          echo "### Flake8 - Erros críticos"
          ERROS_CRITICOS=$(flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics)
          QTDE_CRITICOS=$(flake8 . --count --select=E9,F63,F7,F82)

          if [ "$QTDE_CRITICOS" = "0" ]; then
            echo "✅ Nenhum erro crítico encontrado"
          else
            echo "❌ Foram encontrados $CRIT_COUNT erros críticos"
            echo "$ERROS_CRITICOS"
          fi

          echo ""
          echo "### Flake8 - Outros problemas de estilo e complexidade"
          OUTROS_PROBLEMAS=$(flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics)
          QTDE_OUTROS=$(flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127)
          
          if [ "$QTDE_OUTROS" = "0" ]; then
            echo "✅ Nenhum problema de estilo encontrado"
          else
            echo "❌ Foram encontrados $QTDE_OUTROS problemas"
            echo "$OUTROS_PROBLEMAS"
          fi

          echo ""
          echo "### Pylint"
          echo "Nota final: ${{ steps.pylint_check.outputs.pylint_score }}/10"


      - name: Resumo do Pylint
        if: always()
        run: |
          echo "Relatório completo do Pylint:"
          cat pylint_output.txt || echo "Relatório pylint não encontrado"

  auto-pull-request:
    name: Criar/Atualizar Pull Request
    needs: quality-check
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/feature/') &&
      needs.quality-check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Criar ou atualizar PR automaticamente
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = context.ref.replace('refs/heads/','');
            const openPrs = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${head}`,
              base: 'develop',
              state: 'open'
            });
            if (openPrs.data.length) {
              core.notice(`PR #${openPrs.data[0].number} já existe ✅`);
              return;
            }
            const pr = await github.rest.pulls.create({
              owner, repo,
              head, base: 'develop',
              title: `PR gerado automaticamente: ${head} -> develop`,
              body: '',
              draft: false
            });
            core.notice(`PR criado: #${pr.data.number}`);
