name: CI · Build · Lint · Auto‑PR      # título curto e já descreve tudo

permissions:
  contents: write        # necessário para commits/artefatos
  pull-requests: write   # necessário para abrir / atualizar PR

on:
  push:
    branches: [ 'feature/**' ]           # CI + Auto‑PR em pushes para feature/*
  pull_request:
    branches: [ develop ]                # roda qualidade também para PRs manuais
  workflow_dispatch: { }                # gatilho manual opcional

concurrency: # evita fila de execuções antigas
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Verificações de Qualidade (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11' ]
      fail-fast: false

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flake8 flake8-json pylint pytest pytest-cov
          [ -f requirements.txt ] && pip install -r requirements.txt

      - name: Análise estática com Flake8
        run: |
          echo "Executando Flake8 (apenas erros críticos):"
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

          echo ""
          echo "Executando Flake8 (verificação completa de estilo e complexidade, salvando resultado em JSON):"
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
                   --statistics --format=json --output-file=flake8_report.json

      - name: Análise estática com Pylint
        id: pylint_check
        run: |
          echo "Desabilitando códigos de verificação do Pylint:"
          echo " - C0114: Docstring de módulo ausente (não exige docstring em todos os arquivos)"
          echo " - C0115: Docstring de classe ausente (não exige docstring para toda classe)"
          echo " - C0116: Docstring de função/método ausente (não força documentação em todas funções/métodos)"
          echo " - C0411: Import externo deve vir antes (desativa ordem de imports, útil para scripts)"
          echo " - C0412: Imports do mesmo pacote fora de ordem (não exige agrupamento de imports)"
          echo " - R0903: Classe muito simples (permite classes utilitárias, mesmo com poucos métodos)"
          echo " - C0301: Linha muito longa (aceita linhas mais longas quando necessário, sem exigir quebra)"

          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 \
                  --output-format=json:pylint_report.json,text:pylint_output.txt --exit-zero
          SCORE=$(python3 -c "
          import json, re
          try:
              with open('pylint_report.json') as f:
                  data = json.load(f)
              if isinstance(data, dict) and 'score' in data:
                  print(f'{data[\"score\"]:.2f}')
              else:
                  with open('pylint_output.txt') as f:
                      m = re.search(r'Your code has been rated at ([\\d.]+)/10', f.read())
                      print(m.group(1) if m else '0')
          except:
              print('0')
          ")
          echo "pylint_score=$SCORE" >> $GITHUB_OUTPUT
          python3 -c "exit(0) if float('$SCORE') >= 9.0 else exit(1)"

      # - name: ✅ Executar testes
      #   run: pytest --cov=. --cov-report=xml --cov-report=term-missing

      # - name: ☁️ Enviar cobertura para Codecov
      #   if: ${{ matrix.python-version == '3.11' && hashFiles('coverage.xml') != '' }}
      #   uses: codecov/codecov-action@v4
      #   with:
      #     file: ./coverage.xml
      #     fail_ci_if_error: false

      - name: Resumo da análise de código
        if: always()
        run: |
          echo "## Resumo do Lint"
          echo "### Flake8"
          if [ -f flake8_report.json ]; then
            python3 -c "
          import json
          try:
              with open('flake8_report.json') as f:
                  data = json.load(f)
              if data:
                  print(f'❌ Foram encontrados {len(data)} problemas de estilo')
                  for issue in data[:5]:
                      print(f'  - {issue[\"filename\"]}:{issue[\"line_number\"]} {issue[\"code\"]}: {issue[\"text\"]}')
                  if len(data) > 5:
                      print(f'  ... e mais {len(data) - 5} problemas')
              else:
                  print('✅ Nenhum problema de estilo encontrado')
          except Exception as e:
              print(f'Não foi possível analisar os resultados do flake8: {e}')
          "
          else
            echo "Relatório do flake8 não encontrado"
          fi
          echo "### Pylint"
          echo "Nota final: ${{ steps.pylint_check.outputs.pylint_score }}/10"
          [ -f pylint_output.txt ] && echo "Relatório completo em pylint_output.txt"

      - name: Enviar relatórios como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-py${{ matrix.python-version }}
          path: |
            flake8_report.json
            pylint_report.json
            pylint_output.txt
            coverage.xml
          retention-days: 30

  auto-pull-request:
    name: Criar/Atualizar Pull Request
    needs: quality-check
    if: |
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/feature/') &&
      needs.quality-check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Criar ou atualizar PR automaticamente
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = context.ref.replace('refs/heads/','');
            const openPrs = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${head}`,
              base: 'develop',
              state: 'open'
            });
            if (openPrs.data.length) {
              core.notice(`PR #${openPrs.data[0].number} já existe ✅`);
              return;
            }
            const pr = await github.rest.pulls.create({
              owner, repo,
              head, base: 'develop',
              title: `PR gerado automaticamente: ${head} -> develop`,
              body: '',
              draft: false
            });
            core.notice(`PR criado: #${pr.data.number}`);
