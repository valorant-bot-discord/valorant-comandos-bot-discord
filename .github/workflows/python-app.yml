# Workflow unificado: Lint com flake8 e pylint, testes com pytest, para múltiplas versões do Python.
# Realiza tudo que os 3 fluxos anteriores executavam, evitando redundância.

name: Python CI

on:
  push:
    branches:
      - feature/test-workflows
  pull_request:
    branches:
      - feature/test-workflows
      - develop
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Para erros críticos (parar build se houver esses problemas)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Para estatísticas e código mais limpo
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Rodar Pylint
        run: |
          pylint . --disable=C0114,C0115,C0116,C0411,C0412,R0903,C0301 || true
          pylint $(git ls-files '*.py') --fail-under=9
          STATUS=$?
          if [ $STATUS -eq 0 ] || [ $STATUS -eq 4 ]; then
            exit 0
          else
            exit $STATUS
          fi

      - name: Test with pytest
        run: |
          pytest

  create-pull-request:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref_name, 'feature/') && needs.build.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          base: develop
          title: 'PR automático: ${{ github.ref_name }}'
          body: |
            Esse PR foi criado automaticamente porque o build passou para a branch `${{ github.ref_name }}`.
